name: Trakt

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Refresh Trakt token
        run: |
          status=$(curl --silent --show-error \
              --request POST \
              --header 'Content-Type: application/json' \
              --output token.json \
              --write-out '%{http_code}' \
              --data @- \
              'https://api.trakt.tv/oauth/token' <<EOF
          {
            "client_id": "$TRAKT_CLIENT_ID",
            "client_secret": "$TRAKT_CLIENT_SECRET",
            "refresh_token": "$TRAKT_REFRESH_TOKEN",
            "grant_type": "refresh_token"
          }
          EOF
          )

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Trakt token refresh failed with HTTP $status" >&2
            jq --raw-output '.error_description // .error // .' token.json >&2
            exit 1
          fi

          jq --exit-status '.access_token and .refresh_token' token.json >/dev/null
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REFRESH_TOKEN: ${{ secrets.TRAKT_REFRESH_TOKEN }}

      - name: Update GitHub secrets
        run: |
          jq --raw-output '.access_token' token.json | gh secret set --repo "$GH_REPO" --app actions TRAKT_ACCESS_TOKEN
          jq --raw-output '.refresh_token' token.json | gh secret set --repo "$GH_REPO" --app actions TRAKT_REFRESH_TOKEN
        env:
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
